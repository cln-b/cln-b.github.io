name: channel list scraper

permissions:
  contents: write

on:
  schedule:
    - cron: "59 23 * * *"
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install xmllint
        run: sudo apt-get install -y libxml2-utils

      - name: Fetch Virgin Media IE
        run: |
          mkdir -p "scraper/Virgin IE"
          tmp=$(mktemp)

          curl -s 'https://spark-prod-ie.gnp.cloud.virginmediatv.ie/eng/web/linear-service/v1/channels?cityId=131&language=en&productClass=Orion-DASH' | jq . > "$tmp"

          new_crc=$(cksum < "$tmp" | awk '{print $1}')
          latest=$(ls -1 scraper/Virgin\ IE/*.xml 2>/dev/null | sort | tail -n1)
          if [ -n "$latest" ]; then
            if cmp -s "$tmp" "$latest"; then
              echo "No changes detected"
              rm "$tmp"
              exit 0
            fi
          fi

          timestamp=$(date '+%Y-%m-%d_%H%M%S')
          mv "$tmp" "scraper/Virgin IE/TV360_${timestamp}_(${new_crc}).json"

      - name: Fetch Virgin Media UK
        run: |
          mkdir -p "scraper/Virgin UK"
          timestamp=$(date '+%Y-%m-%d_%H%M%S')
          tmp="scraper/Virgin UK/TV360_${timestamp}.json"
          curl -s 'https://spark-prod-gb.gnp.cloud.virgintvgo.virginmedia.com/eng/web/linear-service/v1/channels?cityId=40980&language=en&productClass=Orion-DASH' | jq . > "$tmp"
          crc=$(cksum < "$tmp" | awk '{print $1}')
          mv "$tmp" "scraper/Virgin UK/TV360_${timestamp}_($crc).json"

      - name: Fetch DVB-I
        run: |
          mkdir -p "scraper/DVB-I"
          tmp=$(mktemp)

          curl -s 'https://dvbipoc.private.saorview.ie/dvb-i/api/serviceList/saorview?image_variant=16x9_colour' -o "$tmp"
          sed -i -E 's/<!--Elapsed time: [0-9]+\.[0-9A-Za-z]*-*[0-9A-Za-z]*-->//g' "$tmp"
          xmllint --format "$tmp" -o "$tmp"

          new_crc=$(cksum < "$tmp" | awk '{print $1}')
          latest=$(ls -1 scraper/DVB-I/*.xml 2>/dev/null | sort | tail -n1)
          if [ -n "$latest" ]; then
            old_crc=$(cksum < "$latest" | awk '{print $1}')
            if [ "$new_crc" = "$old_crc" ]; then
              echo "No changes detected"
              rm "$tmp"
              exit 0
            fi
          fi

          timestamp=$(date '+%Y-%m-%d_%H%M%S')
          mv "$tmp" "scraper/DVB-I/DVB-I_${timestamp}_(${new_crc}).xml"

      - name: Fetch Freely variants
        run: |
          mkdir -p "scraper/Freely/Manchester" "scraper/Freely/NI" "scraper/Freely/Scotland" "scraper/Freely/Wales"
          curl -s 'https://www.freely.co.uk/api/channel-list?nid=64377' -o "scraper/Freely/Manchester/FV-Manc_64377_$(date '+%Y-%m-%d_%H%M%S').json"
          curl -s 'https://www.freely.co.uk/api/channel-list?nid=64969' -o "scraper/Freely/Manchester/Freely-Manc_64969_$(date '+%Y-%m-%d_%H%M%S').json"
          curl -s 'https://www.freely.co.uk/api/channel-list?nid=64424' -o "scraper/Freely/NI/FV-NI_64424_$(date '+%Y-%m-%d_%H%M%S').json"
          curl -s 'https://www.freely.co.uk/api/channel-list?nid=65016' -o "scraper/Freely/NI/Freely-NI_65016_$(date '+%Y-%m-%d_%H%M%S').json"
          curl -s 'https://www.freely.co.uk/api/channel-list?nid=64409' -o "scraper/Freely/Scotland/FV-Scot_64409_$(date '+%Y-%m-%d_%H%M%S').json"
          curl -s 'https://www.freely.co.uk/api/channel-list?nid=65001' -o "scraper/Freely/Scotland/Freely-Scot_65001_$(date '+%Y-%m-%d_%H%M%S').json"
          curl -s 'https://www.freely.co.uk/api/channel-list?nid=64418' -o "scraper/Freely/Wales/FV-Wal_64418_$(date '+%Y-%m-%d_%H%M%S').json"
          curl -s 'https://www.freely.co.uk/api/channel-list?nid=65010' -o "scraper/Freely/Wales/Freely-Wal_65010_$(date '+%Y-%m-%d_%H%M%S').json"

      - name: Commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git diff --staged --quiet || (git commit -m "channel data $(date '+%Y-%m-%d %H:%M')" && git push)
