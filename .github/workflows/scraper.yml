name: channel list scraper

permissions:
  contents: write

on:
  schedule:
    - cron: "58 23 * * *"
      timezone: "Europe/Dublin"
    - cron: "0 12 * * *"
      timezone: "Europe/Dublin"
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install xmllint
        run: sudo apt-get install -y libxml2-utils

      - name: Fetch Virgin Media IE
        run: |
          mkdir -p "scraper/Virgin IE"
          tmp=$(mktemp)

          curl -s 'https://spark-prod-ie.gnp.cloud.virginmediatv.ie/eng/web/linear-service/v1/channels?cityId=131&language=en&productClass=Orion-DASH' | jq . > "$tmp"

          shopt -s nullglob
          latest=$(printf '%s\n' scraper/Virgin\ IE/*.json | sort | tail -n1)
          if [ -n "$latest" ]; then
            if cmp -s "$tmp" "$latest"; then
              echo "No changes detected"
              rm -f "$tmp"
              exit 0
            fi
          fi

          new_crc=$(cksum < "$tmp" | awk '{print $1}')
          timestamp=$(date '+%Y-%m-%d_%H%M%S')
          mv "$tmp" "scraper/Virgin IE/TV360_${timestamp}_(${new_crc}).json"

          echo "CHANGED=${CHANGED}Virgin IE, " >> $GITHUB_ENV

      - name: Fetch Virgin Media UK
        run: |
          mkdir -p "scraper/Virgin UK"
          tmp=$(mktemp)

          curl -s 'https://spark-prod-gb.gnp.cloud.virgintvgo.virginmedia.com/eng/web/linear-service/v1/channels?cityId=40980&language=en&productClass=Orion-DASH' | jq . > "$tmp"

          shopt -s nullglob
          latest=$(printf '%s\n' scraper/Virgin\ UK/*.json | sort | tail -n1)
          if [ -n "$latest" ]; then
            if cmp -s "$tmp" "$latest"; then
              echo "No changes detected"
              rm -f "$tmp"
              exit 0
            fi
          fi

          new_crc=$(cksum < "$tmp" | awk '{print $1}')
          timestamp=$(date '+%Y-%m-%d_%H%M%S')
          mv "$tmp" "scraper/Virgin UK/TV360_${timestamp}_(${new_crc}).json"

          echo "CHANGED=${CHANGED}Virgin UK, " >> $GITHUB_ENV

      - name: Fetch Sky DE
        run: |
          mkdir -p "scraper/Sky DE"
          tmp=$(mktemp)

          curl -s \
            -H 'x-skyott-proposition: SKYQ' \
            -H 'x-skyott-provider: SKY' \
            -H 'x-skyott-territory: DE' \
            'https://atlantis.epgsky.com/as/services/4/0' |
          sed -E 's/"documentId":"[0-9]+","version":[0-9]+,//g' |
          jq . > "$tmp"

          shopt -s nullglob
          latest=$(printf '%s\n' scraper/Sky\ DE/*.json | sort | tail -n1)
          if [ -n "$latest" ]; then
            if cmp -s "$tmp" "$latest"; then
              echo "No changes detected"
              rm -f "$tmp"
              exit 0
            fi
          fi

          new_crc=$(cksum < "$tmp" | awk '{print $1}')
          timestamp=$(date '+%Y-%m-%d_%H%M%S')
          mv "$tmp" "scraper/Sky DE/Sky_DE_${timestamp}_(${new_crc}).json"

          echo "CHANGED=${CHANGED}Sky DE, " >> $GITHUB_ENV

      - name: Fetch DVB-I
        run: |
          mkdir -p "scraper/DVB-I"
          tmp=$(mktemp)

          curl -s 'https://dvbipoc.private.saorview.ie/dvb-i/api/serviceList/saorview?image_variant=16x9_colour' -o "$tmp"
          sed -i -E 's/<!--Elapsed time: [0-9]+\.[0-9A-Za-z]*-*[0-9A-Za-z]*-->//g' "$tmp"

          formatted=$(mktemp)
          xmllint --format "$tmp" -o "$formatted"
          mv "$formatted" "$tmp"

          shopt -s nullglob
          latest=$(printf '%s\n' scraper/DVB-I/*.xml | sort | tail -n1)
          if [ -n "$latest" ]; then
            if cmp -s "$tmp" "$latest"; then
              echo "No changes detected"
              rm -f "$tmp"
              exit 0
            fi
          fi

          new_crc=$(cksum < "$tmp" | awk '{print $1}')
          timestamp=$(date '+%Y-%m-%d_%H%M%S')
          mv "$tmp" "scraper/DVB-I/DVB-I_${timestamp}_(${new_crc}).xml"

          echo "CHANGED=${CHANGED}DVB-I, " >> $GITHUB_ENV

      - name: Fetch Freely variants
        run: |
          freely_changed=0

          fetch_freely() {
            region="$1"
            name="$2"
            nid="$3"

            mkdir -p "scraper/Freely/$region"

            tmp=$(mktemp)

            curl -s "https://www.freely.co.uk/api/channel-list?nid=$nid" > "$tmp"

            shopt -s nullglob
            latest=$(printf '%s\n' scraper/Freely/"$region"/"${name}"_*.json | sort | tail -n1)

            if [ -n "$latest" ]; then
              if cmp -s "$tmp" "$latest"; then
                echo "No changes detected"
                rm -f "$tmp"
                return
              fi
            fi

            new_crc=$(cksum < "$tmp" | awk '{print $1}')
            timestamp=$(date '+%Y-%m-%d_%H%M%S')

            mv "$tmp" "scraper/Freely/$region/${name}_${nid}_${timestamp}_(${new_crc}).json"

            freely_changed=1
          }

          fetch_freely "Manchester" "FV-Manc" "64377"
          fetch_freely "Manchester" "Freely-Manc" "64969"

          fetch_freely "NI" "FV-NI" "64424"
          fetch_freely "NI" "Freely-NI" "65016"

          fetch_freely "Scotland" "FV-Scot" "64409"
          fetch_freely "Scotland" "Freely-Scot" "65001"

          fetch_freely "Wales" "FV-Wal" "64418"
          fetch_freely "Wales" "Freely-Wal" "65010"

          if [ "$freely_changed" -eq 1 ]; then
            echo "CHANGED=${CHANGED}Freely, " >> $GITHUB_ENV
          fi

      - name: Commit
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -A

          if git diff --staged --quiet; then
            echo "No staged changes"
            exit 0
          fi

          changes=$(echo "$CHANGED" | sed 's/[, ]*$//')

          git commit -m "Update $changes"
          git push
