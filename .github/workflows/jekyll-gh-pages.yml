# Sample workflow for building and deploying a Jekyll site to GitHub Pages
name: Deploy Jekyll with GitHub Pages dependencies preinstalled

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]
    paths-ignore:
      - '.github/workflows/scraper.yml'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set mtimes from filenames
        run: |
          set -x
          find scraper -type f | while read -r file; do
            filename=$(basename "$file")

            datetime=$(printf '%s\n' "$filename" |
              grep -m1 -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}_[0-9]{6}' || true)

            if [ -n "$datetime" ]; then
              formatted=$(printf '%s' "$datetime" |
                sed -E 's/^([0-9]{4})-([0-9]{2})-([0-9]{2})_([0-9]{2})([0-9]{2})([0-9]{2})$/\1-\2-\3 \4:\5:\6/')

              touch -d "$formatted" "$file"
            else
              date_part=$(printf '%s\n' "$filename" |
                grep -m1 -oE '[0-9]{4}-[0-9]{2}-[0-9]{2}' || true)

              if [ -n "$date_part" ]; then
                touch -d "$date_part 12:00:00" "$file"
              fi
            fi
          done

      - name: Generate directory listings
        uses: jayanta525/github-pages-directory-listing@v4.0.0
        with:
          FOLDER: scraper

      - name: Add newest-first sorting
        run: |
          cat > /tmp/sort.js << 'EOF'
          document.addEventListener("DOMContentLoaded", () => {
            const tbody = document.querySelector("tbody");
            if (!tbody) return;
      
            const rows = Array.from(tbody.querySelectorAll("tr"));
            const parentRow = rows.find(r => r.querySelector("a")?.getAttribute("href") === "../");
            const fileRows = rows.filter(r => r !== parentRow);
      
            fileRows.sort((a, b) => {
              const aDate = a.children[2]?.textContent.trim() || "";
              const bDate = b.children[2]?.textContent.trim() || "";
              return new Date(bDate) - new Date(aDate);
            });
      
            tbody.innerHTML = "";
            if (parentRow) tbody.appendChild(parentRow);
            fileRows.forEach(r => tbody.appendChild(r));
          });
          EOF
      
          find scraper -name 'index.html' | while read -r file; do
            sed -i "s|</body>|<script>$(cat /tmp/sort.js)</script></body>|" "$file"
          done      

      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
