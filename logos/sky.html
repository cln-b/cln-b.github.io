<!DOCTYPE html>
<html>
<head>
    <title>Logos - Sky UK/IE</title>
    <script>
        function loadImages() {
            var container = document.getElementById("imageContainer");
            container.innerHTML = "";
            
            for (var i = 1000; i <= 7500; i++) {
                var img = document.createElement("img");
                img.src = "https://d2n0069hmnqmmx.cloudfront.net/epgdata/1.0/newchanlogos/100/50/skychb" + i + ".png?" + Date.now();
                img.title = "skychb" + i;
                img.alt = "";
                container.appendChild(img);
            }
        }
    </script>
    <style>
        #imageContainer {
            display: flex;
            flex-wrap: wrap;
        }
        img {
            padding-block: 1.75px;
            padding-inline: 2.5px;
            width: 147px;
            height: 64px;
            object-fit: contain;
            display: block;
        }
    </style>
</head>
<body style="background: grey;">
    <div style="height: 25px">
        <button onclick="loadImages()">Load Images</button>
    </div>
    <div id="imageContainer"></div>
</body>
</html>
